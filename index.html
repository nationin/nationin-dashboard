<body>
  <div id="root"><div class="__loading">Loading NationIn dashboard…</div></div>

  <script>
    // NO JSX - Pure JavaScript React

        { day: 21, channel: "community", task: "Launch NI Ambassador program at 5 pilot colleges",                       type: "milestone", priority: "high" },
      ],

        { day: 1,  channel: "youtube",   task: "Approach first electronics brand sponsor (Robu.in, SB Components, PCBWay)", type: "milestone", priority: "high" },
        { day: 7,  channel: "instagram", task: "Launch 'NI Build Challenge' — weekly hashtag campaign with DIY kit prize", type: "milestone", priority: "high" },
        { day: 14, channel: "instagram", task: "Collab post with micro-influencer #1 (ECE/tech education niche)",        type: "milestone", priority: "high" },
        { day: 21, channel: "instagram", task: "Collab post with micro-influencer #2 (ECE/tech education niche)",        type: "milestone", priority: "high" },
        { day: 14, channel: "community", task: "Seed community discussions daily. Launch 'Project Showcase' competition.", type: "milestone", priority: "medium" },
      ],
      8: [
        { day: 1,  channel: "instagram", task: "Launch Meta ads — Rs 500/day targeting engineering students 18–26 Tier 1+2 cities", type: "milestone", priority: "critical" },
        { day: 1,  channel: "linkedin",  task: "Launch LinkedIn Sponsored Content — Rs 400/day targeting HR + TPOs",    type: "milestone", priority: "high" },
        { day: 7,  channel: "youtube",   task: "Close first brand sponsorship deal (target Rs 10–25K)",                  type: "milestone", priority: "critical" },
        { day: 7,  channel: "youtube",   task: "Add YouTube Shopping to 10 DIY videos",                                  type: "milestone", priority: "high" },
        { day: 7,  channel: "youtube",   task: "Start 'Summer Internship' 3-part video series",                          type: "milestone", priority: "high" },
        { day: 14, channel: "community", task: "Build 7-email drip: webinar signup → course upsell → DIY kit → testimonial ask", type: "milestone", priority: "high" },
        { day: 14, channel: "community", task: "Launch exclusive 'NI Pro' group for paid members",                       type: "milestone", priority: "medium" },
        { day: 21, channel: "whatsapp",  task: "Scale to 700+ members. Launch 'Refer & Earn' — refer 3 friends for free material", type: "milestone", priority: "high" },
      ],
      9: [
        { day: 1,  channel: "youtube",   task: "Achieve 5,000+ subscribers — Begin Shorts monetization payments",        type: "milestone", priority: "critical" },
        { day: 1,  channel: "youtube",   task: "Increase cadence: 5 Shorts/week + 3 long-form/week",                    type: "milestone", priority: "high" },
        { day: 7,  channel: "youtube",   task: "Explore auto-dubbing in Tamil, Telugu, Malayalam for South India",       type: "milestone", priority: "medium" },
        { day: 7,  channel: "instagram", task: "30K+ followers — Launch 'Student of the Month' series with placement stats", type: "milestone", priority: "high" },
        { day: 14, channel: "linkedin",  task: "1,000+ company followers — Post 3 signed B2B contracts as social proof",type: "milestone", priority: "high" },

      ],

      ],
    };

    const MONTHS = [

      { num: 6,  name: "June",      year: 2026, phase: 1 },
      { num: 7,  name: "July",      year: 2026, phase: 2 },
      { num: 8,  name: "August",    year: 2026, phase: 2 },
      { num: 9,  name: "September", year: 2026, phase: 3 },
      { num: 10, name: "October",   year: 2026, phase: 3 },
    ];

    const KPIS = [
      { label: "Instagram Followers", current: "22K",     target: "35K" },
      { label: "YouTube Subscribers", current: "0",       target: "10K" },
      { label: "WhatsApp Members",    current: "0",       target: "1,000+" },
      { label: "NI Community",        current: "98",      target: "1,000+" },
      { label: "Monthly Revenue",     current: "—",       target: "Rs 2–5L" },
      { label: "YPP Monetization",    current: "Pending", target: "Month 2" },
    ];

    const T = {
      pageBg:    "#F0F4F8",
      headerBg:  "#FFFFFF",
      cardBg:    "#FFFFFF",
      cardBg2:   "#F8FAFC",
      border:    "#E2E8F0",
      text:      "#0F172A",
      textSub:   "#475569",
      textMuted: "#94A3B8",
    };

    function getDaysInMonth(m, y) { return new Date(y, m, 0).getDate(); }
    function getFirstDay(m, y) { return new Date(y, m - 1, 1).getDay(); }

    // ===== COMPONENT =====
    function NationInDashboard() {
      const [selectedMonth, setSelectedMonth] = useState(5);
      const [selectedDay, setSelectedDay] = useState(null);
      const [view, setView] = useState("calendar");

      const monthInfo = MONTHS.find(m => m.num === selectedMonth);
      const phase = PHASES.find(p => p.id === monthInfo.phase);
      const daysInMo = getDaysInMonth(selectedMonth, 2026);
      const firstDay = getFirstDay(selectedMonth, 2026);
      const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

      const getTasksForDay = (day) => {
        const dow = new Date(2026, selectedMonth - 1, day).getDay();
        return [
          ...(MONTH_MILESTONES[selectedMonth] || []).filter(m => m.day === day),
          ...(WEEKLY_TASKS[dow] || []),
        ];
      };

      const dayInfo = (day) => {
        const ts = getTasksForDay(day);
        return { n: ts.length };
      };

      return React.createElement('div',
        { style: { fontFamily: "'DM Sans', sans-serif", background: T.pageBg, minHeight: "100vh", color: T.text } },
        
        // STYLES
        React.createElement('style', null, `
          * { box-sizing: border-box; }
          body { font-family: 'DM Sans', sans-serif; }
          .header { background: ${T.headerBg}; border-bottom: 1px solid ${T.border}; padding: 18px 28px; box-shadow: 0 1px 6px rgba(15,23,42,.06); }

          h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
          .subtitle { font-size: 12px; color: ${T.textMuted}; margin: 0; }
          .content { max-width: 1200px; margin: 0 auto; padding: 28px; }
          .card { background: ${T.cardBg}; border-radius: 16px; border: 1px solid ${T.border}; overflow: hidden; box-shadow: 0 1px 6px rgba(15,23,42,.05); }
          .button { padding: 8px 18px; border-radius: 9px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.14s ease; }
          .button:hover { filter: brightness(0.95); }
          .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 20px; }
          .day-cell { aspect-ratio: 1; border: 1px solid ${T.border}; border-radius: 8px; padding: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.14s ease; font-weight: 700; }
          .day-cell:hover { background: #EFF6FF; transform: scale(1.04); }
          .month-nav { padding: 20px; border-bottom: 1px solid ${T.border}; display: flex; justify-content: space-between; align-items: center; }
          .month-buttons { display: flex; gap: 8px; }
          .month-btn { padding: 6px 10px; border-radius: 6px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; }

              React.createElement('h1', null, '6-Month Marketing Dashboard'),
              React.createElement('p', { className: 'subtitle' }, 'May 2026 – October 2026 · nationin.com')

            React.createElement('div', { style: { display: 'flex', gap: 8 } },

                      key: day,
                      className: 'day-cell',
                      onClick: () => setSelectedDay(selectedDay === day ? null : day),

                        border: '1px solid ' + (selectedDay === day ? phase.color : T.border)

                      React.createElement('div', { style: { fontWeight: 600, color: CHANNELS[t.channel]?.color || '#333', marginBottom: 4 } },

                      React.createElement('p', { style: { margin: 0, lineHeight: 1.4 } }, t.task),

                    React.createElement('span', { style: { fontWeight: 700, color: phase.color } }, kpi.target)

          )

    }

    // ===== RENDER =====
    window.addEventListener('load', () => {
      setTimeout(() => {
        try {
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(NationInDashboard));
        } catch (err) {
          console.error('Error:', err);
          document.getElementById('root').innerHTML = '<div style="padding: 40px; color: red;"><h2>Error: ' + err.message + '</h2></div>';
        }
      }, 100);
    });
  </script>
</body>
