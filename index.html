  <script type="text/babel" data-presets="env,react">
    const { useState, useMemo } = React;

    const CHANNELS = {

    const WEEKLY_TASKS = {

        { id: "m2", channel: "linkedin",  task: "Post placement story",                                                  type: "post",       priority: "high" },
        { id: "m3", channel: "threads",   task: "Repurpose same carousel as Threads text + image",                       type: "repurpose",  priority: "medium" },

        { id: "t2", channel: "youtube",   task: "Upload Short — 30s clip from today's long-form",                        type: "short",      priority: "high" },
        { id: "t3", channel: "x",         task: "Live commentary + teasers for new YouTube video",                       type: "post",       priority: "medium" },

        { id: "th2", channel: "instagram",task: "Post Reel — behind the lab / trainer spotlight",                        type: "reel",       priority: "high" },

        { day: 1,  channel: "linkedin",  task: "Activate NI TechTalk newsletter — publish first edition",               type: "milestone", priority: "high" },
        { day: 3,  channel: "instagram", task: "Film student testimonial Reel: Manisha (Cisco)",                         type: "milestone", priority: "high" },
        { day: 5,  channel: "instagram", task: "Film student testimonial Reel: Deepak (BlockDeep Labs)",                 type: "milestone", priority: "high" },
        { day: 7,  channel: "instagram", task: "Film student testimonial Reel: Ashwini (NIH)",                           type: "milestone", priority: "high" },
        { day: 7,  channel: "youtube",   task: "Add Robu.in + Amazon affiliate links to top 20 videos",                  type: "milestone", priority: "high" },

        { day: 1,  channel: "youtube",   task: "Approach first electronics brand sponsor (Robu.in, SB Components, PCBWay)", type: "milestone", priority: "high" },
        { day: 7,  channel: "instagram", task: "Launch 'NI Build Challenge' — weekly hashtag campaign with DIY kit prize", type: "milestone", priority: "high" },
        { day: 14, channel: "instagram", task: "Collab post with micro-influencer #1 (ECE/tech education niche)",        type: "milestone", priority: "high" },
        { day: 21, channel: "instagram", task: "Collab post with micro-influencer #2 (ECE/tech education niche)",        type: "milestone", priority: "high" },
        { day: 14, channel: "community", task: "Seed community discussions daily. Launch 'Project Showcase' competition.", type: "milestone", priority: "medium" },
      ],
      8: [
        { day: 1,  channel: "instagram", task: "Launch Meta ads — Rs 500/day targeting engineering students 18–26 Tier 1+2 cities", type: "milestone", priority: "critical" },
        { day: 1,  channel: "linkedin",  task: "Launch LinkedIn Sponsored Content — Rs 400/day targeting HR + TPOs",    type: "milestone", priority: "high" },
        { day: 7,  channel: "youtube",   task: "Close first brand sponsorship deal (target Rs 10–25K)",                  type: "milestone", priority: "critical" },
        { day: 7,  channel: "youtube",   task: "Add YouTube Shopping to 10 DIY videos",                                  type: "milestone", priority: "high" },
        { day: 7,  channel: "youtube",   task: "Start 'Summer Internship' 3-part video series",                          type: "milestone", priority: "high" },
        { day: 14, channel: "community", task: "Build 7-email drip: webinar signup → course upsell → DIY kit → testimonial ask", type: "milestone", priority: "high" },
        { day: 14, channel: "community", task: "Launch exclusive 'NI Pro' group for paid members",                       type: "milestone", priority: "medium" },
        { day: 21, channel: "whatsapp",  task: "Scale to 700+ members. Launch 'Refer & Earn' — refer 3 friends for free material", type: "milestone", priority: "high" },
      ],
      9: [
        { day: 1,  channel: "youtube",   task: "Achieve 5,000+ subscribers — Begin Shorts monetization payments",        type: "milestone", priority: "critical" },
        { day: 1,  channel: "youtube",   task: "Increase cadence: 5 Shorts/week + 3 long-form/week",                    type: "milestone", priority: "high" },
        { day: 7,  channel: "youtube",   task: "Explore auto-dubbing in Tamil, Telugu, Malayalam for South India",       type: "milestone", priority: "medium" },
        { day: 7,  channel: "instagram", task: "30K+ followers — Launch 'Student of the Month' series with placement stats", type: "milestone", priority: "high" },
        { day: 14, channel: "linkedin",  task: "1,000+ company followers — Post 3 signed B2B contracts as social proof",type: "milestone", priority: "high" },
        { day: 14, channel: "linkedin",  task: "Post 'NI Hiring Board' weekly — jobs for NI alumni",                    type: "milestone", priority: "medium" },
      ],
      10: [
        { day: 1,  channel: "youtube",   task: "Target 10,000 subscribers — Activate Merchandise shelf for DIY bundles", type: "milestone", priority: "critical" },
        { day: 1,  channel: "youtube",   task: "Close 2–3 brand deals/month at Rs 20–40K each",                          type: "milestone", priority: "critical" },
        { day: 7,  channel: "instagram", task: "35K+ followers — Semester-start enrollment campaign (Sep–Oct)",          type: "milestone", priority: "high" },
        { day: 14, channel: "community", task: "NI Community 1,000+ members. WhatsApp 1,000+ members.",                 type: "milestone", priority: "high" },
        { day: 14, channel: "community", task: "Monthly free webinar exclusively for community members (lead magnet)",   type: "milestone", priority: "high" },
        { day: 21, channel: "community", task: "Full UTM audit — identify which channel drives most enrolments",         type: "milestone", priority: "critical" },
        { day: 28, channel: "community", task: "Present 6-month results deck. Plan next quarter strategy.",              type: "milestone", priority: "critical" },
      ],
    };

    const MONTHS = [
      { num: 5,  name: "May",       year: 2026, phase: 1, monthLabel: "Month 1" },
      { num: 6,  name: "June",      year: 2026, phase: 1, monthLabel: "Month 2" },
      { num: 7,  name: "July",      year: 2026, phase: 2, monthLabel: "Month 3" },
      { num: 8,  name: "August",    year: 2026, phase: 2, monthLabel: "Month 4" },
      { num: 9,  name: "September", year: 2026, phase: 3, monthLabel: "Month 5" },
      { num: 10, name: "October",   year: 2026, phase: 3, monthLabel: "Month 6" },
    ];

    const KPIS = [
      { label: "Instagram Followers", current: "22K",     target: "35K",    unit: "",    channel: "instagram" },
      { label: "YouTube Subscribers", current: "0",       target: "10K",    unit: "",    channel: "youtube" },
      { label: "WhatsApp Members",    current: "0",       target: "1,000+", unit: "",    channel: "whatsapp" },
      { label: "NI Community",        current: "98",      target: "1,000+", unit: "",    channel: "community" },
      { label: "Monthly Revenue",     current: "—",       target: "Rs 2–5L",unit: "/mo", channel: "community" },
      { label: "YPP Monetization",    current: "Pending", target: "Month 2",unit: "",    channel: "youtube" },
    ];

    const TYPE_LABELS = {
      post: "📝 Post", reel: "🎬 Reel", short: "⚡ Short", upload: "📹 Upload",
      live: "🔴 LIVE", broadcast: "📢 Broadcast", newsletter: "📰 Newsletter",
      boost: "💰 Boost", story: "💫 Story", repurpose: "🔄 Repurpose", milestone: "🎯 Milestone",
    };

    const T = {
      pageBg:       "#F0F4F8",
      headerBg:     "#FFFFFF",
      cardBg:       "#FFFFFF",
      cardBg2:      "#F8FAFC",
      border:       "#E2E8F0",
      borderStrong: "#CBD5E1",
      text:         "#0F172A",
      textSub:      "#475569",
      textMuted:    "#94A3B8",
      textFaint:    "#CBD5E1",
    };

    function getDaysInMonth(m, y) { return new Date(y, m, 0).getDate(); }
    function getFirstDay(m, y)    { return new Date(y, m - 1, 1).getDay(); }

    function NationInDashboard() {
      const [selectedMonth, setSelectedMonth] = useState(5);
      const [selectedDay,   setSelectedDay]   = useState(null);
      const [channelFilter, setChannelFilter] = useState("all");
      const [done,          setDone]          = useState(new Set());
      const [view,          setView]          = useState("calendar");

      const monthInfo  = MONTHS.find(m => m.num === selectedMonth);
      const phase      = PHASES.find(p => p.id === monthInfo.phase);
      const daysInMo   = getDaysInMonth(selectedMonth, 2026);
      const firstDay   = getFirstDay(selectedMonth, 2026);
      const DAY_NAMES  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

      const getTasksForDay = (day) => {
        const dow = new Date(2026, selectedMonth - 1, day).getDay();
        return [
          ...(MONTH_MILESTONES[selectedMonth] || []).filter(m => m.day === day).map(t => ({ ...t, dayType: "milestone" })),
          ...(WEEKLY_TASKS[dow] || []).map(t => ({ ...t, dayType: "recurring" })),
        ];
      };

      const dayTasks = useMemo(() => {
        if (!selectedDay) return [];
        return getTasksForDay(selectedDay).filter(t => channelFilter === "all" || t.channel === channelFilter);
      }, [selectedDay, selectedMonth, channelFilter]);

      const dayInfo = (day) => {
        const ts = getTasksForDay(day);
        return { crit: ts.some(t => t.priority === "critical"), ms: ts.some(t => t.dayType === "milestone"), n: ts.length };
      };

      const toggle = (k) => setDone(p => { const n = new Set(p); n.has(k) ? n.delete(k) : n.add(k); return n; });
      const doneCount = dayTasks.filter(t => done.has(`${selectedMonth}-${selectedDay}-${t.id}`)).length;

      return (
        <div style={{ fontFamily: "'DM Sans', sans-serif", background: T.pageBg, minHeight: "100vh", color: T.text }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&family=Space+Mono:wght@400;700&display=swap');
            *{box-sizing:border-box;margin:0;padding:0}
            ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#E2E8F0}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
            .dc{transition:all .14s ease;cursor:pointer;border-radius:8px}.dc:hover{background:#EFF6FF!important;transform:scale(1.04)}
            .mb{transition:all .14s ease;cursor:pointer;border:none}.mb:hover{filter:brightness(.95)}
            .cp{cursor:pointer;transition:all .14s ease}.cp:hover{transform:translateY(-1px);filter:brightness(.96)}
            .tr{transition:background .14s ease}.tr:hover{background:#F8FAFC!important}
            .tb{cursor:pointer;transition:all .14s ease;border:none;background:none}.tb:hover{filter:brightness(.95)}
            .cb{cursor:pointer;transition:all .14s ease}.cb:hover{transform:scale(1.12)}
            @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .22s ease}
            @keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}.pu{animation:pu 2s infinite}
          `}</style>

          {/* HEADER */}
          <div style={{ background: T.headerBg, borderBottom: `1px solid ${T.border}`, padding: "18px 28px", boxShadow: "0 1px 6px rgba(15,23,42,.06)" }}>
            <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                  <div style={{ width: 34, height: 34, borderRadius: 9, background: "linear-gradient(135deg,#EA580C,#FB923C)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 800, color: "#fff", boxShadow: "0 3px 10px #EA580C55" }}>N</div>
                  <span style={{ fontFamily: "'Space Mono',monospace", fontSize: 11, color: T.textMuted, letterSpacing: 2 }}>NATION INNOVATION</span>
                </div>
                <h1 style={{ fontSize: 22, fontWeight: 700, color: T.text, letterSpacing: -.5 }}>6-Month Marketing Dashboard</h1>
                <p style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>May 2026 – October 2026 · nationin.com</p>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                {[["calendar","📅 Calendar"],["kpi","📊 KPIs & Budget"]].map(([v,lbl]) => (
                  <button key={v} className="tb" onClick={() => setView(v)}
                    style={{ padding: "8px 18px", borderRadius: 9, fontSize: 13, fontWeight: 600,

                      background: view===v ? phase.color : T.cardBg2,
                      border: `1.5px solid ${view===v ? phase.color : T.border}`,

                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 1200, margin: "0 auto", padding: "24px 28px" }}>

            {/* PHASE BANNER */}
            <div style={{ background: `${phase.color}0D`, border: `1.5px solid ${phase.color}35`, borderRadius: 12, padding: "13px 20px", marginBottom: 22, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 9, height: 9, borderRadius: "50%", background: phase.color }} className="pu" />
                <span style={{ fontWeight: 700, color: phase.color, fontSize: 14 }}>Phase {phase.id}: {phase.name}</span>
                <span style={{ color: T.textMuted, fontSize: 12 }}>· {phase.months.map(m => MONTHS.find(x=>x.num===m)?.name).join(" – ")}</span>
              </div>
              <div style={{ display: "flex", gap: 18 }}>
                {PHASES.map(p => (
                  <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: p.id===phase.id ? p.color : T.textFaint }} />
                    <span style={{ fontSize: 11, color: p.id===phase.id ? p.color : T.textMuted, fontWeight: p.id===phase.id ? 700 : 400 }}>Phase {p.id}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* CALENDAR VIEW */}
            {view === "calendar" && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 360px", gap: 24 }}>

                <div>
                  <div style={{ display: "flex", gap: 6, marginBottom: 18, overflowX: "auto", paddingBottom: 4 }}>
                    {MONTHS.map(m => {
                      const ph = PHASES.find(p=>p.id===m.phase), active = selectedMonth===m.num;
                      return (
                        <button key={m.num} className="mb"
                          onClick={() => { setSelectedMonth(m.num); setSelectedDay(null); }}

                            border: `1.5px solid ${active ? ph.color : T.border}`,
                            boxShadow: active ? `0 2px 10px ${ph.color}45` : "0 1px 3px rgba(0,0,0,.04)" }}>
                          <span style={{ opacity: .7, fontSize: 11 }}>{m.monthLabel} · </span>{m.name}

                      );
                    })}
                  </div>

                  <div style={{ background: T.cardBg, borderRadius: 16, padding: 20, border: `1px solid ${T.border}`, boxShadow: "0 1px 8px rgba(15,23,42,.05)" }}>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 8 }}>

                    <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>

                        const day = i+1, { crit, ms, n } = dayInfo(day), sel = selectedDay===day;
                        return (
                          <div key={day} className="dc"
                            onClick={() => setSelectedDay(sel ? null : day)}
                            style={{ aspectRatio:"1",
                              background: sel ? `${phase.color}18` : crit ? "#FEF2F2" : T.cardBg2,
                              border: `1.5px solid ${sel ? phase.color : crit ? "#FCA5A5" : T.border}`,
                              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                            <span style={{ fontSize: 13, fontWeight: sel?700:500, color: sel?phase.color:crit?"#DC2626":T.text }}>{day}</span>
                            {n > 0 && (
                              <div style={{ display:"flex", gap:2, marginTop:2, justifyContent:"center" }}>
                                {crit  && <div style={{ width:5,height:5,borderRadius:"50%",background:"#DC2626" }} />}
                                {ms && !crit && <div style={{ width:5,height:5,borderRadius:"50%",background:phase.color }} />}
                                <div style={{ width:5,height:5,borderRadius:"50%",background:T.borderStrong }} />
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ display:"flex", gap:18, marginTop:16, paddingTop:14, borderTop:`1px solid ${T.border}`, flexWrap:"wrap" }}>
                      {[{ dot:"#DC2626",lbl:"Critical milestone" },{ dot:phase.color,lbl:"Phase milestone" },{ dot:T.borderStrong,lbl:"Recurring tasks" }].map(l => (
                        <div key={l.lbl} style={{ display:"flex",alignItems:"center",gap:6 }}>
                          <div style={{ width:7,height:7,borderRadius:"50%",background:l.dot }} />
                          <span style={{ fontSize:11,color:T.textMuted }}>{l.lbl}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div style={{ marginTop:16 }}>
                    <p style={{ fontSize:10,color:T.textMuted,marginBottom:8,fontFamily:"'Space Mono',monospace",letterSpacing:1.5 }}>FILTER BY CHANNEL</p>
                    <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                      <div className="cp" onClick={() => setChannelFilter("all")}
                        style={{ padding:"5px 13px",borderRadius:20,fontSize:12,fontWeight:600,
                          background:channelFilter==="all"?T.text:T.cardBg,
                          border:`1px solid ${channelFilter==="all"?T.text:T.border}`,
                          color:channelFilter==="all"?"#fff":T.textSub }}>
                        All Channels
                      </div>
                      {Object.entries(CHANNELS).map(([key,ch]) => (
                        <div key={key} className="cp" onClick={() => setChannelFilter(key===channelFilter?"all":key)}
                          style={{ padding:"5px 13px",borderRadius:20,fontSize:12,fontWeight:600,
                            background:channelFilter===key?ch.bg:T.cardBg,
                            border:`1px solid ${channelFilter===key?ch.color:T.border}`,
                            color:channelFilter===key?ch.color:T.textSub }}>
                          {ch.icon} {ch.label}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div>
                  {selectedDay ? (
                    <div className="fi" style={{ background:T.cardBg,borderRadius:16,padding:20,border:`1px solid ${T.border}`,boxShadow:"0 2px 14px rgba(15,23,42,.08)",position:"sticky",top:20 }}>
                      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14 }}>
                        <div>
                          <p style={{ fontFamily:"'Space Mono',monospace",fontSize:10,color:T.textMuted,letterSpacing:2 }}>{monthInfo.name.toUpperCase()} {selectedDay}</p>
                          <h2 style={{ fontSize:24,fontWeight:700,color:phase.color }}>{DAY_NAMES[new Date(2026,selectedMonth-1,selectedDay).getDay()]}</h2>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <p style={{ fontSize:11,color:T.textMuted }}>{dayTasks.length} tasks</p>
                          <p style={{ fontSize:12,color:"#059669",fontWeight:700 }}>{doneCount} done</p>
                        </div>
                      </div>
                      <div style={{ background:T.border,borderRadius:6,height:6,marginBottom:16,overflow:"hidden" }}>
                        <div style={{ height:"100%",borderRadius:6,background:phase.color,transition:"width .3s ease",
                          width:dayTasks.length>0?`${(doneCount/dayTasks.length)*100}%`:"0%" }} />
                      </div>
                      <div style={{ display:"flex",flexDirection:"column",gap:8,maxHeight:530,overflowY:"auto" }}>
                        {dayTasks.length===0
                          ? <p style={{ color:T.textMuted,fontSize:13,textAlign:"center",padding:"24px 0" }}>No tasks match the selected filter.</p>
                          : dayTasks.map((task,idx) => {
                              const ch = CHANNELS[task.channel], k = `${selectedMonth}-${selectedDay}-${task.id}`, isDone = done.has(k);
                              return (
                                <div key={idx} className="tr"
                                  style={{ background:isDone?T.cardBg2:task.dayType==="milestone"?`${ch.color}07`:T.cardBg,
                                    border:`1px solid ${isDone?T.border:task.priority==="critical"?`${ch.color}55`:T.border}`,
                                    borderRadius:10,padding:"10px 12px",display:"flex",gap:10,alignItems:"flex-start",opacity:isDone?.55:1 }}>
                                  <div className="cb" onClick={() => toggle(k)}
                                    style={{ width:19,height:19,borderRadius:5,flexShrink:0,marginTop:1,
                                      background:isDone?ch.color:"#fff",
                                      border:`2px solid ${isDone?ch.color:T.borderStrong}`,
                                      display:"flex",alignItems:"center",justifyContent:"center",
                                      boxShadow:isDone?`0 1px 4px ${ch.color}55`:"0 1px 3px rgba(0,0,0,.08)" }}>
                                    {isDone && <span style={{ color:"#fff",fontSize:10,fontWeight:800 }}>✓</span>}
                                  </div>
                                  <div style={{ flex:1 }}>
                                    <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap" }}>
                                      <span style={{ fontSize:10,fontWeight:700,color:ch.color,background:ch.bg,padding:"2px 7px",borderRadius:4 }}>{ch.icon} {ch.label}</span>
                                      <span style={{ fontSize:10,color:T.textMuted }}>{TYPE_LABELS[task.type]||task.type}</span>
                                      {task.priority==="critical" && <span style={{ fontSize:10,color:"#DC2626",fontWeight:700 }}>🔴 CRITICAL</span>}
                                      {task.dayType==="milestone"&&task.priority!=="critical" && <span style={{ fontSize:10,color:phase.color }}>🎯 MILESTONE</span>}
                                    </div>
                                    <p style={{ fontSize:12,color:isDone?T.textMuted:T.text,lineHeight:1.45,textDecoration:isDone?"line-through":"none" }}>{task.task}</p>
                                  </div>
                                </div>
                              );
                            })}
                      </div>
                    </div>
                  ) : (
                    <div style={{ background:T.cardBg,borderRadius:16,padding:32,border:`1px solid ${T.border}`,textAlign:"center",boxShadow:"0 1px 6px rgba(15,23,42,.05)" }}>
                      <div style={{ fontSize:42,marginBottom:14 }}>📅</div>
                      <p style={{ color:T.textSub,fontSize:14,fontWeight:500 }}>Click any date to see<br/>daily tasks & milestones</p>
                      <div style={{ marginTop:22,display:"flex",flexDirection:"column",gap:8 }}>
                        <p style={{ fontFamily:"'Space Mono',monospace",fontSize:10,color:T.textFaint,letterSpacing:2,marginBottom:4 }}>MONTHLY TARGETS</p>
                        {[{ label:"YouTube pieces",value:"~46/mo" },{ label:"Instagram pieces",value:"~20+/mo" },{ label:"Other channels",value:"~30+/mo" }].map(item => (
                          <div key={item.label} style={{ display:"flex",justifyContent:"space-between",padding:"9px 14px",background:T.cardBg2,borderRadius:9,border:`1px solid ${T.border}` }}>
                            <span style={{ fontSize:12,color:T.textSub }}>{item.label}</span>
                            <span style={{ fontSize:12,color:phase.color,fontWeight:700 }}>{item.value}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* KPI VIEW */}
            {view === "kpi" && (
              <div className="fi" style={{ display:"flex",flexDirection:"column",gap:24 }}>

                <div>
                  <p style={{ fontFamily:"'Space Mono',monospace",fontSize:10,color:T.textMuted,letterSpacing:2,marginBottom:14 }}>6-MONTH KPI TARGETS</p>
                  <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12 }}>
                    {KPIS.map((kpi,i) => {
                      const ch = CHANNELS[kpi.channel];
                      return (
                        <div key={i} style={{ background:T.cardBg,border:`1.5px solid ${ch.color}30`,borderRadius:12,padding:"16px 18px",boxShadow:"0 1px 5px rgba(15,23,42,.05)" }}>
                          <div style={{ fontSize:11,color:T.textMuted,marginBottom:8 }}>{kpi.label}</div>
                          <div style={{ fontSize:22,fontWeight:700,color:ch.color }}>{kpi.target}<span style={{ fontSize:12,color:T.textMuted }}>{kpi.unit}</span></div>
                          <div style={{ fontSize:11,color:T.textFaint,marginTop:4 }}>Current: {kpi.current}</div>
                          <div style={{ height:3,background:T.border,borderRadius:2,marginTop:10 }}>
                            <div style={{ width:"5%",height:"100%",background:ch.color,borderRadius:2 }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div>
                  <p style={{ fontFamily:"'Space Mono',monospace",fontSize:10,color:T.textMuted,letterSpacing:2,marginBottom:14 }}>REVENUE TRAJECTORY (ALL SOCIAL-DRIVEN)</p>
                  <div style={{ background:T.cardBg,borderRadius:16,padding:20,border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(15,23,42,.05)" }}>
                    <div style={{ display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8 }}>
                      {[{mo:"May",low:30,high:80},{mo:"Jun",low:50,high:100},{mo:"Jul",low:80,high:150},{mo:"Aug",low:120,high:250},{mo:"Sep",low:150,high:350},{mo:"Oct",low:200,high:500}].map((item,i) => {
                        const ph=PHASES.find(p=>p.months.includes(i+5)), maxH=160, hH=(item.high/500)*maxH, lH=(item.low/500)*maxH;
                        return (
                          <div key={item.mo} style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:8 }}>
                            <div style={{ position:"relative",width:"100%",height:maxH,display:"flex",alignItems:"flex-end",justifyContent:"center" }}>
                              <div style={{ width:"60%",height:hH,background:`${ph.color}18`,borderRadius:"6px 6px 0 0",border:`1px solid ${ph.color}40`,position:"relative" }}>
                                <div style={{ position:"absolute",bottom:0,left:0,right:0,height:lH,background:ph.color,borderRadius:"4px 4px 0 0",opacity:.85 }} />
                              </div>
                            </div>
                            <span style={{ fontSize:11,color:T.textSub,fontWeight:600 }}>{item.mo}</span>
                            <div style={{ textAlign:"center" }}>
                              <div style={{ fontSize:10,color:ph.color,fontWeight:700 }}>{item.high}K</div>
                              <div style={{ fontSize:10,color:T.textMuted }}>{item.low}K</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ marginTop:16,paddingTop:14,borderTop:`1px solid ${T.border}`,display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap" }}>
                      {PHASES.map(p => (
                        <div key={p.id} style={{ display:"flex",alignItems:"center",gap:6 }}>
                          <div style={{ width:10,height:10,background:p.color,borderRadius:2 }} />
                          <span style={{ fontSize:11,color:T.textSub }}>Phase {p.id}: {p.name}</span>
                        </div>
                      ))}
                      <span style={{ fontSize:11,color:T.textMuted }}>· bars = conservative/optimistic range (Rs ×1000)</span>
                    </div>
                  </div>
                </div>

                <div>
                  <p style={{ fontFamily:"'Space Mono',monospace",fontSize:10,color:T.textMuted,letterSpacing:2,marginBottom:14 }}>MONTHLY BUDGET BREAKDOWN</p>
                  <div style={{ background:T.cardBg,borderRadius:16,overflow:"hidden",border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(15,23,42,.05)" }}>
                    <table style={{ width:"100%",borderCollapse:"collapse" }}>
                      <thead>
                        <tr style={{ background:T.cardBg2 }}>
                          {["Line Item","Month 1–2","Month 3–4","Month 5–6"].map(h => (
                            <th key={h} style={{ padding:"12px 16px",fontSize:11,color:T.textMuted,fontWeight:600,textAlign:h==="Line Item"?"left":"right",fontFamily:"'Space Mono',monospace",letterSpacing:.5,borderBottom:`1px solid ${T.border}` }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {[
                          ["Meta ads (Instagram + Facebook)","₹9,000","₹15,000","₹20,000"],
                          ["LinkedIn Sponsored Content","—","₹8,000","₹12,000"],
                          ["Content tools (Canva Pro, CapCut)","₹2,000","₹2,000","₹2,000"],
                          ["Campus ambassador kits (5 colleges)","₹5,000","₹3,000","₹3,000"],
                          ["Giveaway prizes (DIY kits)","₹2,500","₹2,500","₹2,500"],
                          ["Micro-influencer collaborations","—","₹5,000","₹8,000"],
                          ["WhatsApp Business API","—","₹1,500","₹1,500"],
                        ].map((row,i) => (
                          <tr key={i} style={{ borderTop:`1px solid ${T.border}` }}>
                            <td style={{ padding:"11px 16px",fontSize:13,color:T.text }}>{row[0]}</td>
                            {row.slice(1).map((cell,j) => (
                              <td key={j} style={{ padding:"11px 16px",fontSize:13,color:cell==="—"?T.textFaint:T.textSub,textAlign:"right",fontFamily:"'Space Mono',monospace" }}>{cell}</td>
                            ))}
                          </tr>
                        ))}
                        <tr style={{ borderTop:`2px solid ${T.borderStrong}`,background:T.cardBg2 }}>
                          <td style={{ padding:"12px 16px",fontSize:13,fontWeight:700,color:T.text }}>MONTHLY TOTAL</td>
                          {["₹18,500","₹37,000","₹49,000"].map((val,j) => (
                            <td key={j} style={{ padding:"12px 16px",fontSize:13,fontWeight:700,color:PHASES[j].color,textAlign:"right",fontFamily:"'Space Mono',monospace" }}>{val}</td>
                          ))}
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                <div>
                  <p style={{ fontFamily:"'Space Mono',monospace",fontSize:10,color:T.textMuted,letterSpacing:2,marginBottom:14 }}>🚀 DO THIS WEEK — TOP 10 ZERO-COST ACTIONS</p>
                  <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                    {[
                      { ch:"x",         task:"Rename @supportNationin → @NationInnovation or @nationin_in (2 min, huge brand impact)" },
                      { ch:"youtube",   task:"Add Robu.in + Amazon affiliate links to top 20 most-viewed videos (earns passively forever)" },
                      { ch:"instagram", task:"Film 3 student testimonial Reels: Manisha (Cisco), Deepak (BlockDeep), Ashwini (NIH)" },
                      { ch:"youtube",   task:"Go to YouTube Studio → Earn tab → check current YPP eligibility status right now" },
                      { ch:"youtube",   task:"Create 5 YouTube playlists: ML Series, IoT Series, VLSI Series, DIY Projects, Career Guidance" },
                      { ch:"instagram", task:"Update link-in-bio from homepage → next webinar signup page (higher conversion)" },
                      { ch:"whatsapp",  task:"Launch WhatsApp Broadcast channel + share join link across all platforms" },
                      { ch:"community", task:"Add UTM parameters to all links in all social bios (enables enrolment tracking)" },
                      { ch:"youtube",   task:"Enable mid-roll ads on all existing YouTube videos that are 8+ minutes long" },
                      { ch:"youtube",   task:"Post 1 trainer introduction video (Mr. Saurabh Singh) — builds personal trust at scale" },
                    ].map((item,i) => {
                      const ch = CHANNELS[item.ch];
                      return (
                        <div key={i} style={{ display:"flex",gap:12,alignItems:"flex-start",background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",boxShadow:"0 1px 3px rgba(15,23,42,.04)" }}>
                          <span style={{ fontFamily:"'Space Mono',monospace",fontSize:12,color:T.textFaint,minWidth:26 }}>#{i+1}</span>
                          <span style={{ fontSize:11,fontWeight:700,color:ch.color,background:ch.bg,padding:"2px 8px",borderRadius:4,whiteSpace:"nowrap",marginTop:1 }}>{ch.icon} {ch.label}</span>
                          <p style={{ fontSize:13,color:T.textSub,lineHeight:1.45 }}>{item.task}</p>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<NationInDashboard />);
  </script>
</body>
</html>
